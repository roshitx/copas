[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Strict marker policy - reject unknown markers
addopts = --strict-markers

markers =
    unit: Fast unit tests with no external dependencies (fast, isolated)
    integration: Tests with database/external service mocks (medium speed)
    contract: API contract validation tests (schema compliance)
    live: Tests that make real network calls (slow, requires connectivity)
    smoke: Critical path smoke tests (minimal sanity checks)
    timeout: Mark test with a timeout (used by live tests)

# Async configuration
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function

# Socket blocking for unit tests (prevent accidental network calls)
# Use -p no:socket to disable socket blocking when needed
