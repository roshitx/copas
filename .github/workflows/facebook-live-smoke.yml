name: Facebook Live Smoke Tests

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

jobs:
  backend-live:
    name: Backend Facebook Live Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        working-directory: ./backend
        run: |
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Run backend Facebook live tests
        working-directory: ./backend
        run: pytest -m live -k facebook

      - name: Upload backend artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: backend-facebook-live-results
          path: backend/.pytest_cache/
          retention-days: 7

  frontend-live:
    name: Frontend Facebook Live Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: ./frontend
        run: npx playwright install --with-deps chromium

      - name: Run frontend Facebook live smoke tests
        working-directory: ./frontend
        run: npx playwright test --grep @live facebook-live-smoke

      - name: Upload frontend artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-facebook-live-results
          path: |
            frontend/test-results/
            frontend/playwright-report/
          retention-days: 7
